basePath: /api
definitions:
  dto.EmailVerficationRequest:
    properties:
      email:
        type: string
    type: object
  dto.OTPVerificationRequest:
    properties:
      email:
        type: string
      otp:
        type: string
    type: object
  dto.OTPVerificationResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    type: object
  utils.APIError:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  utils.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/utils.APIError'
      success:
        example: false
        type: boolean
    type: object
  utils.SuccessResponse:
    properties:
      data: {}
      success:
        example: true
        type: boolean
    type: object
host: localhost:8080
info:
  contact: {}
  description: API for The Bridge - Professional network for seafarers
  title: The Bridge API
  version: "1.0"
paths:
  /v1/auth/trigger-otp:
    post:
      consumes:
      - application/json
      description: Sends an OTP to the provided email address for authentication
      parameters:
      - description: Email payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.EmailVerficationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      summary: Trigger OTP
      tags:
      - auth
  /v1/auth/verify-otp:
    post:
      consumes:
      - application/json
      description: Verifies OTP and returns access & refresh tokens on success
      parameters:
      - description: OTP verification payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.OTPVerificationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.OTPVerificationResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            allOf:
            - $ref: '#/definitions/utils.ErrorResponse'
            - properties:
                error:
                  $ref: '#/definitions/utils.APIError'
              type: object
        "401":
          description: Unauthorized
          schema:
            allOf:
            - $ref: '#/definitions/utils.ErrorResponse'
            - properties:
                error:
                  $ref: '#/definitions/utils.APIError'
              type: object
        "500":
          description: Internal Server Error
          schema:
            allOf:
            - $ref: '#/definitions/utils.ErrorResponse'
            - properties:
                error:
                  $ref: '#/definitions/utils.APIError'
              type: object
      summary: Verify OTP
      tags:
      - auth
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
